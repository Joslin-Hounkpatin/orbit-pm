<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Project Intelligence Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --primary: #4f46e5; --primary-hover: #4338ca;
            --bg-body: #f8fafc; --card-bg: #ffffff; 
            --border-color: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; 
        }
        
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; letter-spacing: -0.01em; overflow-x: hidden; }
        
      
        .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 0.75rem 1.5rem; z-index: 1000; }
        
        
        .bento-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; 
            padding: 1.5rem; height: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .bento-card:hover { 
            border-color: var(--primary); transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        
        .kpi-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; font-size: 1.3rem; flex-shrink: 0; }
        .bg-soft-indigo { background: #eef2ff; color: #4f46e5; }
        .bg-soft-emerald { background: #ecfdf5; color: #10b981; }
        .bg-soft-rose { background: #fff1f2; color: #f43f5e; }
        
        .stat-value { 
            font-size: 1.65rem; font-weight: 800; line-height: 1.1; margin-bottom: 0.25rem; 
            overflow-wrap: anywhere;
        }
        .stat-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }

 
        .table thead th { background: #f8fafc; text-transform: uppercase; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); padding: 1rem; border: none; }
        .progress { background-color: #f1f5f9; border-radius: 10px; height: 8px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .progress-bar { border-radius: 10px; transition: width 0.6s ease; }
        
        .badge-health { padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 700; font-size: 0.65rem; display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .bg-health-good { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .bg-health-warning { background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; }
        .bg-health-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }

        /* Modal & Task Management */
        .task-row { background: #f8fafc; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid var(--border-color); transition: 0.2s; }
        .task-row:hover { background: #f1f5f9; border-color: var(--primary); }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; }
        @media print { .no-print { display: none !important; } }
        .td-budget { min-width: 200px; overflow-wrap: anywhere; }
    </style>
</head>
<body>

    <div class="toast-container">
        <div id="liveToast" class="toast align-items-center text-white border-0 shadow-lg" role="alert">
            <div class="d-flex"><div class="toast-body fw-bold" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <nav class="navbar sticky-top no-print">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold d-flex align-items-center text-primary">
                <i class="bi bi-intersect me-2"></i>ORBIT <span class="text-dark ms-1">PRO</span>
            </span>
            
            <div class="d-flex gap-2 align-items-center">
                <div class="search-box position-relative d-none d-md-block">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                    <input type="text" id="searchBar" class="form-control form-control-sm ps-5 border-radius-8" onkeyup="filterTable()" placeholder="Rechercher...">
                </div>
                
                <select class="form-select form-select-sm fw-bold w-auto" id="currencySelector" onchange="changeCurrency()">
                    <option value="XOF">FCFA</option><option value="EUR">EUR (€)</option><option value="USD">USD ($)</option>
                </select>

                <select class="form-select form-select-sm fw-bold w-auto" id="langSelector" onchange="changeLanguage()">
                    <option value="fr">FR</option><option value="en">EN</option>
                </select>

                <div class="vr mx-2 opacity-25"></div>

                <button class="btn btn-light btn-sm fw-bold border" onclick="exportToExcel()"><i class="bi bi-file-earmark-spreadsheet me-1"></i> Excel</button>
                <button class="btn btn-light btn-sm fw-bold border" onclick="exportToPDF()"><i class="bi bi-file-earmark-pdf me-1"></i> PDF</button>
                <button class="btn btn-primary btn-sm px-3 fw-bold" onclick="openModal()">
                    <i class="bi bi-plus-lg me-1"></i> <span data-i18n="btn_add">Nouveau Projet</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4" id="report-content">
       
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-indigo"><i class="bi bi-layers"></i></div><p class="stat-label" data-i18n="kpi_projects">Projets Actifs</p><p class="stat-value" id="total-projects">0</p></div></div>
            <div class="col-6 col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-emerald"><i class="bi bi-wallet2"></i></div><p class="stat-label" data-i18n="kpi_budget">Budget Global</p><p class="stat-value" id="total-budget">0</p></div></div>
            <div class="col-6 col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-rose"><i class="bi bi-exclamation-triangle"></i></div><p class="stat-label" data-i18n="kpi_alerts">Alertes Risque</p><p class="stat-value text-danger" id="risk-alerts">0</p></div></div>
            <div class="col-6 col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-indigo"><i class="bi bi-activity"></i></div><p class="stat-label" data-i18n="kpi_health">Santé Globale</p><p class="stat-value" id="global-health">0%</p></div></div>
        </div>

    
        <div class="row g-4 mb-4">
            <div class="col-lg-8"><div class="bento-card"><h6 class="fw-bold mb-4 text-muted small" data-i18n="chart_main_title">Performance : Progrès vs Temps</h6><div id="main-chart"></div></div></div>
            <div class="col-lg-4"><div class="bento-card"><h6 class="fw-bold mb-4 text-muted small" data-i18n="chart_donut_title">Répartition des Risques</h6><div id="donut-chart"></div></div></div>
        </div>

       
        <div class="bento-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="fw-bold m-0" data-i18n="table_title">Suivi Opérationnel</h6>
                <button class="btn btn-outline-danger btn-sm border-0 no-print" onclick="confirmClearAll()"><i class="bi bi-trash3"></i></button>
            </div>
            <div id="empty-state" class="text-center py-5 d-none"><i class="bi bi-folder2-open fs-1 opacity-25"></i><p class="text-muted mt-2">Aucun projet.</p></div>
            <div class="table-responsive" id="table-container">
                <table class="table" id="projectTable">
                    <thead>
                        <tr>
                            <th data-i18n="table_name">Projet</th>
                            <th data-i18n="table_budget">Budget (Dépensé / Prévu)</th>
                            <th data-i18n="table_progress">Avancement</th>
                            <th data-i18n="table_time">Temps</th>
                            <th data-i18n="table_status">Statut</th>
                            <th class="text-end no-print">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>


    <div class="modal fade" id="projectModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0" id="modalTitle">Nouveau Projet</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    
                    <form onsubmit="event.preventDefault(); saveProject();">
                        <input type="hidden" id="p_index" value="-1">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><label class="form-label small fw-bold">Nom du Projet</label><input type="text" id="p_name" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label small fw-bold">Début</label><input type="date" id="p_start" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label small fw-bold">Deadline</label><input type="date" id="p_end" class="form-control" required></div>
                        </div>

                       
                        <div class="row g-3 mb-4 p-3 rounded-3" style="background: #f1f5f9; border: 1px dashed var(--primary);">
                            <div class="col-md-4"><label class="form-label small fw-bold">Budget Prévu (Global)</label><input type="number" id="p_manual_budget" class="form-control shadow-sm" placeholder="Ex: 5000000"></div>
                            <div class="col-md-4"><label class="form-label small fw-bold text-danger">Budget Consommé (Réel)</label><input type="number" id="p_manual_consumed" class="form-control shadow-sm" placeholder="Ex: 2500000"></div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-primary">Avancement Global %</label>
                                <div class="d-flex align-items-center gap-2">
                                    <input type="range" id="p_manual_progress" class="form-range" min="0" max="100" value="0" oninput="this.nextElementSibling.innerText = this.value + '%'">
                                    <output class="badge bg-primary">0%</output>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold m-0 text-primary small"><i class="bi bi-list-task me-2"></i>OU DÉTAILLER PAR TÂCHES (FACULTATIF)</h6>
                            <button type="button" class="btn btn-outline-primary btn-sm fw-bold shadow-sm" onclick="addTaskRow()">+ Ajouter une tâche</button>
                        </div>
                        <div id="tasksContainer" style="max-height: 200px; overflow-y: auto;" class="mb-4 pe-2"></div>

                        <div class="row pt-3 border-top g-2">
                            <div class="col-6"><button type="button" class="btn btn-light w-100 fw-bold py-2" data-bs-dismiss="modal">Annuler</button></div>
                            <div class="col-6"><button type="submit" class="btn btn-primary w-100 fw-bold py-2">Enregistrer</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        const translations = {
            fr: { kpi_projects: "Projets Actifs", kpi_budget: "Budget Global", kpi_alerts: "Alertes Risque", kpi_health: "Santé Globale", btn_add: "Nouveau Projet", table_title: "Suivi Opérationnel", chart_main_title: "Performance : Progrès vs Temps", chart_donut_title: "Répartition des Risques", table_name: "Projet", table_budget: "Budget (Dépensé / Prévu)", table_progress: "Avancement", table_time: "Temps", table_status: "Statut", status_good: "Sain", status_warning: "Vigilance", status_danger: "Critique" },
            en: { kpi_projects: "Active Projects", kpi_budget: "Global Budget", kpi_alerts: "Risk Alerts", kpi_health: "Global Health", btn_add: "New Project", table_title: "Operational Tracking", chart_main_title: "Performance: Progress vs Time", chart_donut_title: "Risk Distribution", table_name: "Project", table_budget: "Budget (Spent / Planned)", table_progress: "Progress", table_time: "Time", table_status: "Status", status_good: "Healthy", status_warning: "Warning", status_danger: "Critical" }
        };

        let state = { projects: JSON.parse(localStorage.getItem('orbit_final_v6')) || [], currency: localStorage.getItem('orbit_curr') || 'XOF', lang: localStorage.getItem('orbit_lang') || 'fr' };
        let mainChart, donutChart;
        const bsModal = new bootstrap.Modal(document.getElementById('projectModal'));

        window.onload = () => { 
            document.getElementById('langSelector').value = state.lang; 
            document.getElementById('currencySelector').value = state.currency; 
            updateUI(); 
        };

        function showToast(msg, type = 'primary') {
            const toastEl = document.getElementById('liveToast');
            toastEl.className = `toast align-items-center text-white border-0 shadow-lg bg-${type === 'danger' ? 'danger' : 'primary'}`;
            document.getElementById('toastMessage').innerText = msg;
            new bootstrap.Toast(toastEl).show();
        }

        function addTaskRow(name = '', budget = '', consumed = '', progress = 0) {
            const container = document.getElementById('tasksContainer');
            const row = document.createElement('div');
            row.className = 'task-row row g-2 align-items-center';
            row.innerHTML = `
                <div class="col-md-4"><input type="text" placeholder="Tâche" class="form-control form-control-sm t-name" value="${name}" required></div>
                <div class="col-md-2"><input type="number" placeholder="Budget" class="form-control form-control-sm t-budget" value="${budget}" required></div>
                <div class="col-md-2"><input type="number" placeholder="Dépensé" class="form-control form-control-sm t-consumed" value="${consumed}" required></div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm t-progress">
                        <option value="0" ${progress==0?'selected':''}>0%</option>
                        <option value="10" ${progress==10?'selected':''}>10%</option>
                        <option value="25" ${progress==25?'selected':''}>25%</option>
                        <option value="50" ${progress==50?'selected':''}>50%</option>
                        <option value="75" ${progress==75?'selected':''}>75%</option>
                        <option value="100" ${progress==100?'selected':''}>100%</option>
                    </select>
                </div>
                <div class="col-md-1 text-end"><button type="button" class="btn btn-link text-danger p-0" onclick="this.parentElement.parentElement.remove()"><i class="bi bi-trash"></i></button></div>
            `;
            container.appendChild(row);
        }

        function openModal(idx = -1) {
            document.getElementById('p_index').value = idx;
            document.getElementById('tasksContainer').innerHTML = '';
            if(idx > -1) {
                const p = state.projects[idx];
                document.getElementById('modalTitle').innerText = "Modifier Projet";
                document.getElementById('p_name').value = p.name;
                document.getElementById('p_start').value = p.start;
                document.getElementById('p_end').value = p.deadline;
                document.getElementById('p_manual_budget').value = p.manualBudget || '';
                document.getElementById('p_manual_consumed').value = p.manualConsumed || '';
                document.getElementById('p_manual_progress').value = p.manualProgress || 0;
                document.querySelector('output').innerText = (p.manualProgress || 0) + '%';
                (p.tasks || []).forEach(t => addTaskRow(t.name, t.budget, t.consumed, t.progress));
            } else {
                document.getElementById('modalTitle').innerText = "Nouveau Projet";
                document.getElementById('p_name').value = '';
                document.getElementById('p_manual_budget').value = '';
                document.getElementById('p_manual_consumed').value = '';
                document.getElementById('p_manual_progress').value = 0;
                document.querySelector('output').innerText = '0%';
            }
            bsModal.show();
        }

        function saveProject() {
            const idx = parseInt(document.getElementById('p_index').value);
            const taskRows = document.querySelectorAll('.task-row');
            let tasks = [];
            taskRows.forEach(row => {
                tasks.push({
                    name: row.querySelector('.t-name').value,
                    budget: parseFloat(row.querySelector('.t-budget').value) || 0,
                    consumed: parseFloat(row.querySelector('.t-consumed').value) || 0,
                    progress: parseInt(row.querySelector('.t-progress').value) || 0
                });
            });

            const pData = {
                name: document.getElementById('p_name').value,
                start: document.getElementById('p_start').value,
                deadline: document.getElementById('p_end').value,
                manualBudget: parseFloat(document.getElementById('p_manual_budget').value) || 0,
                manualConsumed: parseFloat(document.getElementById('p_manual_consumed').value) || 0,
                manualProgress: parseInt(document.getElementById('p_manual_progress').value) || 0,
                tasks: tasks
            };
            if(idx > -1) state.projects[idx] = pData; else state.projects.push(pData);
            saveAndRefresh(); bsModal.hide(); showToast("Projet enregistré !");
        }

        function calculateMetrics(p) {
            let totalBudget = 0, totalConsumed = 0, progressP = 0;
            if (p.tasks && p.tasks.length > 0) {
                totalBudget = p.tasks.reduce((s, t) => s + t.budget, 0);
                totalConsumed = p.tasks.reduce((s, t) => s + t.consumed, 0);
                const earnedValue = p.tasks.reduce((s, t) => s + (t.budget * (t.progress / 100)), 0);
                progressP = totalBudget > 0 ? (earnedValue / totalBudget) * 100 : 0;
            } else {
                totalBudget = p.manualBudget || 0;
                totalConsumed = p.manualConsumed || 0;
                progressP = p.manualProgress || 0;
            }
            const now = new Date(), start = new Date(p.start), end = new Date(p.deadline);
            const timeP = Math.min(Math.max(((now - start) / (end - start)) * 100, 0), 100);
            let status = "good";
            if (totalConsumed > totalBudget || progressP < (timeP - 15)) status = "danger";
            else if (progressP < timeP) status = "warning";
            return { totalBudget, totalConsumed, progressP, timeP, status };
        }

        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = translations[state.lang][el.getAttribute('data-i18n')]; });
            const body = document.getElementById('tableBody');
            if (state.projects.length === 0) { document.getElementById('empty-state').classList.remove('d-none'); document.getElementById('table-container').classList.add('d-none'); } 
            else { document.getElementById('empty-state').classList.add('d-none'); document.getElementById('table-container').classList.remove('d-none'); }
            
            body.innerHTML = '';
            let totalB = 0, risks = 0, totalP = 0;
            const labels = [], dataP = [], dataT = [], sCounts = {good:0, warning:0, danger:0};
            
            state.projects.forEach((p, i) => {
                const m = calculateMetrics(p);
                totalB += m.totalBudget; totalP += m.progressP;
                if(m.status === 'danger') risks++; sCounts[m.status]++;
                labels.push(p.name); dataP.push(Math.round(m.progressP)); dataT.push(Math.round(m.timeP));

                body.innerHTML += `<tr>
                    <td><span class="fw-bold">${p.name}</span><br><small class="text-muted">${p.tasks.length} tâches</small></td>
                    <td class="td-budget"><span class="${m.totalConsumed > m.totalBudget ? 'text-danger fw-bold' : 'fw-bold'}">${formatCurrency(m.totalConsumed)}</span> / <small class="text-muted">${formatCurrency(m.totalBudget)}</small></td>
                    <td><div class="progress mb-1"><div class="progress-bar bg-primary shadow-sm" style="width: ${m.progressP}%"></div></div><small class="fw-bold text-primary">${Math.round(m.progressP)}%</small></td>
                    <td><div class="progress mb-1"><div class="progress-bar bg-info" style="width: ${m.timeP}%"></div></div><small class="text-muted">${Math.round(m.timeP)}%</small></td>
                    <td><span class="badge-health bg-health-${m.status}"><i class="bi bi-circle-fill" style="font-size:0.4rem"></i> ${translations[state.lang]['status_'+m.status]}</span></td>
                    <td class="text-end no-print"><button class="btn btn-link btn-sm text-primary p-0 me-2" onclick="openModal(${i})"><i class="bi bi-pencil-square"></i></button><button class="btn btn-link btn-sm text-danger p-0" onclick="deleteProject(${i})"><i class="bi bi-trash3"></i></button></td>
                </tr>`;
            });
            document.getElementById('total-projects').innerText = state.projects.length; 
            document.getElementById('total-budget').innerText = formatCurrency(totalB); 
            document.getElementById('risk-alerts').innerText = risks; 
            document.getElementById('global-health').innerText = state.projects.length ? Math.round(totalP/state.projects.length)+"%" : "0%";
            renderCharts(labels, dataP, dataT, sCounts);
        }

        function renderCharts(labels, pData, tData, sCounts) {
            const mainOpt = {
                series: [{ name: 'Progrès Réel %', data: pData }, { name: 'Temps Écoulé %', data: tData }],
                chart: { type: 'area', height: 280, toolbar: { show: false }, zoom: { enabled: false } },
                colors: ['#4f46e5', '#0ea5e9'],
                stroke: { curve: 'smooth', width: 3 },
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.45, opacityTo: 0.05 } },
                xaxis: { categories: labels }, yaxis: { max: 100, tickAmount: 5 },
                dataLabels: { enabled: false }
            };
            if (mainChart) mainChart.destroy(); mainChart = new ApexCharts(document.querySelector("#main-chart"), mainOpt); mainChart.render();
            
            const donutOpt = {
                series: [sCounts.good, sCounts.warning, sCounts.danger],
                chart: { type: 'donut', height: 280 },
                labels: [translations[state.lang].status_good, translations[state.lang].status_warning, translations[state.lang].status_danger],
                colors: ['#10b981', '#f59e0b', '#ef4444'],
                plotOptions: { pie: { donut: { size: '75%' } } }, legend: { position: 'bottom' }
            };
            if (donutChart) donutChart.destroy(); donutChart = new ApexCharts(document.querySelector("#donut-chart"), donutOpt); donutChart.render();
        }

        function formatCurrency(v) { return new Intl.NumberFormat(state.lang === 'fr' ? 'fr-FR' : 'en-US', { style: 'currency', currency: state.currency, maximumFractionDigits: 0 }).format(v); }
        function saveAndRefresh() { localStorage.setItem('orbit_final_v6', JSON.stringify(state.projects)); updateUI(); }
        function changeLanguage() { state.lang = document.getElementById('langSelector').value; localStorage.setItem('orbit_lang', state.lang); updateUI(); }
        function changeCurrency() { state.currency = document.getElementById('currencySelector').value; localStorage.setItem('orbit_curr', state.currency); updateUI(); }
        function filterTable() { const val = document.getElementById('searchBar').value.toLowerCase(); document.querySelectorAll('#tableBody tr').forEach(row => { row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none'; }); }
        function deleteProject(i) { if(confirm("Supprimer ?")) { state.projects.splice(i,1); saveAndRefresh(); showToast("Projet supprimé", "danger"); } }
        function confirmClearAll() { if(confirm("Tout effacer ?")) { state.projects = []; saveAndRefresh(); } }
        function exportToExcel() { if (!state.projects.length) return; const data = state.projects.map(p => { const m = calculateMetrics(p); return { "Projet": p.name, "Dépensé": m.totalConsumed, "Prévu": m.totalBudget, "Progrès %": Math.round(m.progressP), "Statut": m.status }; }); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Orbit"); XLSX.writeFile(wb, "Orbit_Export.xlsx"); }
        function exportToPDF() { const element = document.getElementById('report-content'); html2pdf().set({ margin: 10, filename: 'Orbit_Rapport.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { orientation: 'landscape' } }).from(element).save(); }
    </script>
</body>
</html>
