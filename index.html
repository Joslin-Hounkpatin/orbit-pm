<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Project Pilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --primary: #4f46e5; --bg-body: #f8fafc; --card-bg: #ffffff; --border-color: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 0.75rem 1.5rem; }
        
        .bento-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 1.25rem; 
            height: 100%; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-card:hover { 
            border-color: var(--primary); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(-6px); 
        }

        .bento-card:hover .kpi-icon { transform: scale(1.1); transition: transform 0.3s ease; }
        .kpi-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; font-size: 1.2rem; }
        .bg-soft-indigo { background: #eef2ff; color: #4f46e5; }
        .bg-soft-emerald { background: #ecfdf5; color: #10b981; }
        .bg-soft-rose { background: #fff1f2; color: #f43f5e; }
        .bg-soft-amber { background: #fffbeb; color: #f59e0b; }
        .stat-value { font-size: 1.75rem; font-weight: 700; }
        .stat-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .badge-health { padding: 0.35rem 0.75rem; border-radius: 6px; font-weight: 600; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 6px; }
        .bg-health-good { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .bg-health-warning { background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; }
        .bg-health-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .table thead th { background: #f8fafc; text-transform: uppercase; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); padding: 1rem; border: none; }
        .table tbody td { padding: 1rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; }
        .search-box input { padding-left: 35px; border-radius: 8px; border: 1px solid var(--border-color); background: #f8fafc; }
        .progress { background-color: #f1f5f9; border-radius: 10px; }
        .btn-primary { background: var(--primary); border: none; font-weight: 600; border-radius: 8px; }
        .form-select { border-radius: 8px; border: 1px solid var(--border-color); font-size: 0.85rem; }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1060; }
        .bg-toast-success { background: #10b981 !important; }
        .bg-toast-danger { background: #ef4444 !important; }
        
    </style>
</head>
<body>

    
    <div class="toast-container">
        <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">Action réussie !</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <nav class="navbar sticky-top mb-4 no-export-pdf">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold d-flex align-items-center text-primary">
                <i class="bi bi-intersect me-2"></i>ORBIT <span class="text-dark ms-1">PM</span>
            </span>
            <div class="d-flex gap-2 align-items-center">
                <select class="form-select form-select-sm fw-semibold" id="currencySelector" onchange="changeCurrency()">
                    <option value="XOF">FCFA</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="USD">USD ($)</option>
                </select>
                <select class="form-select form-select-sm fw-semibold" id="langSelector" onchange="changeLanguage()">
                    <option value="fr">FR</option>
                    <option value="en">EN</option>
                </select>
                <div class="vr mx-2 opacity-25"></div>
                
                <button class="btn btn-outline-danger btn-sm fw-bold border" onclick="confirmClearAll()"><i class="bi bi-trash3 me-1"></i></button>
                <button class="btn btn-light btn-sm fw-bold border text-muted ms-1" onclick="exportToExcel()"><i class="bi bi-file-earmark-spreadsheet me-1"></i> Excel</button>
                <button class="btn btn-light btn-sm fw-bold border text-muted ms-1" onclick="exportToPDF()"><i class="bi bi-file-earmark-pdf me-1"></i> PDF</button>
                <button class="btn btn-primary btn-sm px-3 ms-2" onclick="openModal()">
                    <i class="bi bi-plus-lg me-1"></i> <span data-i18n="btn_add">Nouveau Projet</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container" id="report-content">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-indigo"><i class="bi bi-kanban"></i></div><p class="stat-label" data-i18n="kpi_projects">Projets Actifs</p><p class="stat-value" id="total-projects">0</p></div></div>
            <div class="col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-emerald"><i class="bi bi-wallet2"></i></div><p class="stat-label" data-i18n="kpi_budget">Budget Engagé</p><p class="stat-value" id="total-budget">0</p></div></div>
            <div class="col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-rose"><i class="bi bi-exclamation-triangle"></i></div><p class="stat-label" data-i18n="kpi_alerts">Alertes Risque</p><p class="stat-value text-danger" id="risk-alerts">0</p></div></div>
            <div class="col-md-3"><div class="bento-card"><div class="kpi-icon bg-soft-amber"><i class="bi bi-heart-pulse"></i></div><p class="stat-label" data-i18n="kpi_health">Santé Globale</p><p class="stat-value text-success" id="global-health">0%</p></div></div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-8"><div class="bento-card"><h6 class="fw-bold mb-4 text-muted small" data-i18n="chart_main_title">Performance Budget vs Temps</h6><div id="main-chart"></div></div></div>
            <div class="col-lg-4"><div class="bento-card"><h6 class="fw-bold mb-4 text-muted small" data-i18n="chart_donut_title">Répartition des Risques</h6><div id="donut-chart"></div></div></div>
        </div>

        <div class="bento-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="fw-bold m-0" data-i18n="table_title">Suivi Opérationnel</h6>
                <div class="search-box no-export-pdf position-relative"><i class="bi bi-search text-muted"></i><input type="text" id="searchBar" class="form-control form-control-sm" onkeyup="filterTable()" placeholder="Rechercher..."></div>
            </div>
            <div id="empty-state" class="text-center py-4 d-none"><i class="bi bi-folder2-open d-block fs-1 opacity-25"></i><p>Aucun projet.</p></div>
            <div class="table-responsive" id="table-container">
                <table class="table" id="projectTable">
                    <thead>
                        <tr><th data-i18n="table_name">Projet</th><th data-i18n="table_budget">Budget</th><th data-i18n="table_time">Temps</th><th class="text-center">Score</th><th data-i18n="table_status">Statut</th><th class="text-end">Actions</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    
    <div class="modal fade" id="projectModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg rounded-4"><div class="modal-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4"><h5 class="fw-bold m-0" id="modalTitle">Nouveau Projet</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <form onsubmit="event.preventDefault(); saveProject();">
            <input type="hidden" id="p_index" value="-1">
            <div class="mb-3"><label class="form-label small fw-bold">Nom</label><input type="text" id="p_name" class="form-control" required></div>
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="form-label small fw-bold">Budget Total</label><input type="number" id="p_budget" class="form-control" min="1" required></div>
                <div class="col-6"><label class="form-label small fw-bold">Consommé</label><input type="number" id="p_consumed" class="form-control" min="0" value="0"></div>
            </div>
            <div class="row g-2 mb-4">
                <div class="col-6"><label class="form-label small fw-bold">Début</label><input type="date" id="p_start" class="form-control" required></div>
                <div class="col-6"><label class="form-label small fw-bold">Deadline</label><input type="date" id="p_end" class="form-control" required></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Enregistrer</button>
        </form>
    </div></div></div></div>

    
    <div class="modal fade" id="confirmModal" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content border-0 shadow-lg rounded-4"><div class="modal-body p-4 text-center">
        <div class="text-danger mb-3"><i class="bi bi-exclamation-triangle fs-1"></i></div>
        <h5 class="fw-bold mb-2">Êtes-vous sûr ?</h5>
        <p class="text-muted small mb-4" id="confirmText">Cette action est irréversible.</p>
        <input type="hidden" id="deleteIndex" value="-1">
        <div class="d-flex gap-2">
            <button class="btn btn-light w-50 fw-bold" data-bs-dismiss="modal">Annuler</button>
            <button class="btn btn-danger w-50 fw-bold" onclick="executeDelete()">Confirmer</button>
        </div>
    </div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        const translations = {
            fr: { kpi_projects: "Projets Actifs", kpi_budget: "Budget Engagé", kpi_alerts: "Alertes Risque", kpi_health: "Santé Globale", btn_add: "Nouveau Projet", table_title: "Suivi Opérationnel", chart_main_title: "Performance Budget vs Temps", chart_donut_title: "Répartition des Risques", table_name: "Projet", table_budget: "Budget Utilisé", table_time: "Temps Passé", table_status: "Statut", status_good: "Sain", status_warning: "Vigilance", status_danger: "Critique" },
            en: { kpi_projects: "Active Projects", kpi_budget: "Total Budget", kpi_alerts: "Risk Alerts", kpi_health: "Global Health", btn_add: "New Project", table_title: "Operational Tracking", chart_main_title: "Budget vs Time Performance", chart_donut_title: "Risk Distribution", table_name: "Project", table_budget: "Budget Used", table_time: "Time Elapsed", table_status: "Status", status_good: "Healthy", status_warning: "Warning", status_danger: "Critical" }
        };

        let state = {
            projects: JSON.parse(localStorage.getItem('orbit_v6')) || [],
            currency: localStorage.getItem('orbit_curr') || 'XOF',
            lang: localStorage.getItem('orbit_lang') || 'fr'
        };

        let mainChart, donutChart;
        const bsModal = new bootstrap.Modal(document.getElementById('projectModal'));
        const bsConfirm = new bootstrap.Modal(document.getElementById('confirmModal'));

        window.onload = () => {
            document.getElementById('langSelector').value = state.lang;
            document.getElementById('currencySelector').value = state.currency;
            updateUI();
        };

        function showToast(msg, type = 'success') {
            const toastEl = document.getElementById('liveToast');
            toastEl.classList.remove('bg-toast-success', 'bg-toast-danger');
            toastEl.classList.add('bg-toast-' + type);
            document.getElementById('toastMessage').innerText = msg;
            new bootstrap.Toast(toastEl).show();
        }

        function calculate(p) {
            const now = new Date(), start = new Date(p.start), end = new Date(p.deadline);
            const timeP = Math.min(Math.max(((now - start) / (end - start)) * 100, 0), 100);
            const budgP = (p.consumed / p.budget) * 100;
            const health = Math.round(Math.max(0, Math.min(100, 100 - (budgP - timeP))));
            let status = health < 60 ? "Danger" : (health < 85 ? "Warning" : "Good");
            return { timeP, budgP, health, status };
        }

        function openModal(index = -1) {
            document.getElementById('p_index').value = index;
            if(index > -1) {
                const p = state.projects[index];
                document.getElementById('modalTitle').innerText = "Modifier le projet";
                document.getElementById('p_name').value = p.name;
                document.getElementById('p_budget').value = p.budget;
                document.getElementById('p_consumed').value = p.consumed;
                document.getElementById('p_start').value = p.start;
                document.getElementById('p_end').value = p.deadline;
            } else {
                document.getElementById('modalTitle').innerText = "Nouveau Projet";
                document.getElementById('p_name').value = '';
                document.getElementById('p_budget').value = '';
                document.getElementById('p_consumed').value = 0;
            }
            bsModal.show();
        }

        function saveProject() {
            const idx = parseInt(document.getElementById('p_index').value);
            const start = document.getElementById('p_start').value;
            const end = document.getElementById('p_end').value;

            if (new Date(end) <= new Date(start)) {
                showToast("Erreur : La date de deadline est invalide.", "danger");
                return;
            }

            const pData = {
                name: document.getElementById('p_name').value,
                budget: parseFloat(document.getElementById('p_budget').value),
                consumed: parseFloat(document.getElementById('p_consumed').value),
                start: start,
                deadline: end
            };

            if(idx > -1) state.projects[idx] = pData;
            else state.projects.push(pData);

            save();
            bsModal.hide();
            showToast(idx > -1 ? "Projet mis à jour" : "Projet ajouté");
        }

        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = translations[state.lang][el.getAttribute('data-i18n')]; });
            const body = document.getElementById('tableBody');
            const empty = document.getElementById('empty-state');
            const container = document.getElementById('table-container');

            if (state.projects.length === 0) { empty.classList.remove('d-none'); container.classList.add('d-none'); } 
            else { empty.classList.add('d-none'); container.classList.remove('d-none'); }

            body.innerHTML = '';
            let tB = 0, alerts = 0, hSum = 0;
            const labels = [], bD = [], tD = [];

            state.projects.forEach((p, i) => {
                const m = calculate(p);
                tB += p.budget; if (m.status !== 'Good') alerts++; hSum += m.health;
                labels.push(p.name); bD.push(m.budgP.toFixed(1)); tD.push(m.timeP.toFixed(1));
                
                body.innerHTML += `<tr>
                    <td><span class="fw-bold">${p.name}</span></td>
                    <td><div class="progress" style="height: 6px;"><div class="progress-bar bg-primary" style="width: ${m.budgP}%"></div></div><small class="fw-bold">${m.budgP.toFixed(0)}%</small></td>
                    <td><div class="progress" style="height: 6px;"><div class="progress-bar bg-info" style="width: ${m.timeP}%"></div></div><small class="fw-bold">${m.timeP.toFixed(0)}%</small></td>
                    <td class="text-center fw-bold">${m.health}</td>
                    <td><span class="badge-health bg-health-${m.status.toLowerCase()}"><i class="bi bi-circle-fill" style="font-size:0.4rem"></i> ${translations[state.lang]['status_'+m.status.toLowerCase()]}</span></td>
                    <td class="text-end">
                        <button class="btn btn-link btn-sm text-primary p-0 me-2" onclick="openModal(${i})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-link btn-sm text-danger p-0" onclick="confirmDelete(${i})"><i class="bi bi-trash3"></i></button>
                    </td>
                </tr>`;
            });

            document.getElementById('total-projects').innerText = state.projects.length;
            document.getElementById('total-budget').innerText = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: state.currency }).format(tB);
            document.getElementById('risk-alerts').innerText = alerts;
            document.getElementById('global-health').innerText = state.projects.length ? Math.round(hSum/state.projects.length)+"%" : "0%";
            renderCharts(labels, bD, tD);
        }

        function renderCharts(labels, bD, tD) {
            const areaOpt = { series: [{ name: 'Budget %', data: bD }, { name: 'Temps %', data: tD }], chart: { type: 'area', height: 280, toolbar: { show: false } }, colors: ['#4f46e5', '#0ea5e9'], stroke: { curve: 'smooth', width: 2 }, xaxis: { categories: labels } };
            if (mainChart) mainChart.destroy();
            mainChart = new ApexCharts(document.querySelector("#main-chart"), areaOpt);
            mainChart.render();

            const d = state.projects.filter(p => calculate(p).status === 'Danger').length, w = state.projects.filter(p => calculate(p).status === 'Warning').length, g = state.projects.length - (d + w);
            if (donutChart) donutChart.destroy();
            donutChart = new ApexCharts(document.querySelector("#donut-chart"), { series: [g, w, d], chart: { type: 'donut', height: 280 }, labels: [translations[state.lang].status_good, translations[state.lang].status_warning, translations[state.lang].status_danger], colors: ['#10b981', '#f59e0b', '#ef4444'] });
            donutChart.render();
        }

        function save() { localStorage.setItem('orbit_v6', JSON.stringify(state.projects)); updateUI(); }
        
      
        function confirmDelete(i) {
            document.getElementById('deleteIndex').value = i;
            document.getElementById('confirmText').innerText = "Voulez-vous supprimer ce projet ?";
            bsConfirm.show();
        }

        function confirmClearAll() {
            document.getElementById('deleteIndex').value = "ALL";
            document.getElementById('confirmText').innerText = "Voulez-vous supprimer TOUS les projets ?";
            bsConfirm.show();
        }

        function executeDelete() {
            const idx = document.getElementById('deleteIndex').value;
            if (idx === "ALL") {
                state.projects = [];
                showToast("Tous les projets ont été supprimés", "danger");
            } else {
                state.projects.splice(parseInt(idx), 1);
                showToast("Projet supprimé", "danger");
            }
            save();
            bsConfirm.hide();
        }

        function changeLanguage() { state.lang = document.getElementById('langSelector').value; localStorage.setItem('orbit_lang', state.lang); updateUI(); }
        function changeCurrency() { state.currency = document.getElementById('currencySelector').value; localStorage.setItem('orbit_curr', state.currency); updateUI(); }
        function filterTable() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('#tableBody tr').forEach(row => { row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none'; });
        }

        function exportToExcel() {
            if (state.projects.length === 0) { showToast("Rien à exporter", "danger"); return; }
            const data = state.projects.map(p => {
                const m = calculate(p);
                return { "Projet": p.name, "Budget Total": p.budget, "Consommé": p.consumed, "Santé": m.health, "Statut": m.status };
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Projets");
            XLSX.writeFile(wb, `Orbit_Export.xlsx`);
            showToast("Export Excel réussi");
        }

        function exportToPDF() {
            if (state.projects.length === 0) { showToast("Rien à exporter", "danger"); return; }
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 10, filename: 'Orbit_Rapport.pdf', jsPDF: { orientation: 'landscape' } }).from(element).save().then(() => {
                showToast("Export PDF réussi");
            });
        }
    </script>
</body>
</html>
